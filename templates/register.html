{% extends "base.html" %}

{% block title %}

Register

{% endblock %}

{% block content %}

<div class="container-fluid py-5">

    <div class="row justify-content-center align-items-center">

        <!-- ===================================== -->
        <!-- Registration Form -->
        <!-- ===================================== -->

        <div class="col-lg-7 col-md-10">

            <div class="card app-card shadow-lg border-0">

                <div class="card-header app-header success">

                    <h3 class="mb-0">

                        <i class="fa-solid fa-user-plus me-2"></i>

                        Create Your Account

                    </h3>

                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        <div class="row">

                            <!-- Full Name -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="fa-solid fa-user"></i>

                                    </span>

                                    <input

                                        type="text"

                                        name="fullname"

                                        class="form-control"

                                        placeholder="Enter Full Name"

                                        required>

                                </div>

                            </div>

                            <!-- Email -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Email Address

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="fa-solid fa-envelope"></i>

                                    </span>

                                    <input

                                        type="email"

                                        name="email"

                                        class="form-control"

                                        placeholder="Enter Email"

                                        required>

                                </div>

                            </div>

                            <!-- Password -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Password

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="fa-solid fa-lock"></i>

                                    </span>

                                    <input

                                        type="password"

                                        name="password"

                                        class="form-control"

                                        placeholder="Create Password"

                                        required>

                                </div>

                            </div>

                            <!-- Confirm Password -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Confirm Password

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="fa-solid fa-lock"></i>

                                    </span>

                                    <input

                                        type="password"

                                        name="confirm"

                                        class="form-control"

                                        placeholder="Confirm Password"

                                        required>

                                </div>

                            </div>

                            <!-- Age -->

                            <div class="col-md-4 mb-4">

                                <label class="form-label">

                                    Age

                                </label>

                                <input

                                    type="number"

                                    name="age"

                                    class="form-control"

                                    placeholder="Age">

                            </div>

                            <!-- Gender -->

                            <div class="col-md-4 mb-4">

                                <label class="form-label">

                                    Gender

                                </label>

                                <select

                                    name="gender"

                                    class="form-select">

                                    <option value="">Select</option>

                                    <option>Male</option>

                                    <option>Female</option>

                                    <option>Other</option>

                                </select>

                            </div>

                            <!-- Blood Group -->

                            <div class="col-md-4 mb-4">

                                <label class="form-label">

                                    Blood Group

                                </label>

                                <input

                                    type="text"

                                    name="blood"

                                    class="form-control"

                                    placeholder="A+, O+, etc.">

                            </div>

                            <!-- Phone -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Phone Number

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="fa-solid fa-phone"></i>

                                    </span>

                                    <input

                                        type="text"

                                        name="phone"

                                        class="form-control"

                                        placeholder="Phone Number">

                                </div>

                            </div>

                            <!-- Emergency Contact -->

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Emergency Contact

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="fa-solid fa-user-shield"></i>

                                    </span>

                                    <input

                                        type="text"

                                        name="emergency"

                                        class="form-control"

                                        placeholder="Emergency Contact">

                                </div>

                            </div>

                        </div>

                        <button

                            type="submit"

                            class="btn app-btn success w-100">

                            <i class="fa-solid fa-user-plus me-2"></i>

                            Create Account

                        </button>

                    </form>

                    <hr class="my-4">

                    <div class="text-center">

                        Already have an account?

                        <a

                            href="/login"

                            class="fw-bold text-decoration-none">

                            Login Here

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
